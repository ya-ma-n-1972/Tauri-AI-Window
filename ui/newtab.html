<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>新しいタブ</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { display: flex; flex-direction: column; align-items: center;
      font-family: system-ui, sans-serif; background: #fafafa; color: #333;
      padding: 14vh 24px 40px; }
    h1 { font-weight: 300; color: #555; margin: 0 0 24px; font-size: 28px; letter-spacing: 0.05em; }
    #addr { width: 60%; max-width: 640px; padding: 12px 18px; font-size: 16px;
      border: 1px solid #ccc; border-radius: 24px; outline: none; background: #fff; }
    #addr:focus { border-color: #4a90e2; box-shadow: 0 0 0 3px rgba(74,144,226,0.18); }
    .hint { color: #888; margin: 16px 0 0; font-size: 13px; }
    h2 { font-size: 14px; color: #888; font-weight: 500; margin: 32px 0 12px; letter-spacing: 0.04em; }
    #bookmarks { width: 100%; max-width: 900px; display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .card { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 14px 16px;
      cursor: pointer; overflow: hidden; transition: box-shadow 0.15s, transform 0.15s; }
    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.1); transform: translateY(-1px); }
    .card .title { font-size: 13px; font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card .url { font-size: 11px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
    .empty { color: #aaa; font-size: 13px; }
  </style>
</head>
<body>
  <h1>新しいタブ</h1>
  <input id="addr" type="text" placeholder="URL を入力して Enter (例: example.com)" autocomplete="off" spellcheck="false" />
  <p class="hint">スキームを省略すると https:// が補われます</p>
  <h2>ブックマーク</h2>
  <div id="bookmarks"></div>
  <script src="newtab.js"></script>
</body>
</html>
